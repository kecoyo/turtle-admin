<body>
    <div class="layui-tab">
        <ul class="layui-tab-title notselect">
            {foreach $clist as $k=>$v}
            {if isset($type_id) and $type_id eq $k}
            <li data-open="{:url('index')}?type_id={$k}" class="layui-this">{$v.name}<sup class="layui-badge border-radius">{$v.total??0}</sup></li>
            {else}
            <li data-open="{:url('index')}?type_id={$k}">{$v.name}<sup class="layui-badge border-radius">{$v.total??0}</sup></li>
            {/if}
            {/foreach}
        </ul>
        <div class="layui-tab-content table-block">
            <div class='icon-list-checkall think-checkbox'>
                <label><input data-auto-none data-check-target='.list-check-box' type='checkbox'> 全选</label>
            </div>
            <ul class="icon-list">
            {foreach $list as $key=>$vo}
            <li class="icon-item">
                <div class='think-checkbox'>
                    <label><input class="list-check-box" value='{$vo.id}' type='checkbox'></label>
                </div>
                <div class="headimg" data-tips-image data-lazy-src="{$vo.url}"></div>
            </li>
            {/foreach}
            </ul>
            {empty name='list'}<span class="notdata">没有记录哦</span>{else}{$pagehtml|raw|default=''}{/empty}
        </div>
    </div>
<script src="__ROOT__/static/plugs/jquery/jquery.min.js" type="text/javascript"></script>
<script>
    $(function () {
        $('li').on('click', function (className) {
            className = $(this).find('i').get(0).className;
            if (className) {
                top.$('[name="{$field}"]').val(className).trigger('change');
                top.layer.close(top.layer.getFrameIndex(window.name));
            }
        });
    });


</script>

</body>
