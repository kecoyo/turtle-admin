{include file='account/formstyle'}
<form id="AccountEditForm" class="layui-form layui-card" action="{:request()->url()}" data-auto="true" method="post" autocomplete="off">
    <div class="layui-card-body padding-left-40">

        <div class="layui-row layui-col-space15">
            <div class="layui-col-xs2 text-center">
                <input type="hidden" name="headimg" data-updir="user_headimg" value="{$vo.headimg|default=''}">
                <script>$('[name=headimg]').uploadOneImage()</script>
            </div>
            <div class="layui-col-xs10">
                <label class="block relative">
                    <span class="color-green font-w7">账号名称</span>
                    <span class="color-desc margin-left-5"></span>
                    <input name="name" value='{$vo.name|default=""}' required placeholder="请输入账号名称" class="layui-input">
                    <span class="help-block"><b>必填，</b>请填写账号名称，建议字符不要太长，一般2-10个汉字</span>
                </label>
            </div>
        </div>

        <div class="layui-form-item">
            <span class="color-green font-w7">账号属性</span>
            <table class="layui-table margin-top-10">
                <thead>
                <tr>
                    <th width="25%" class="text-center nowrap">属性名</th>
                    <th width="55%" class="text-center nowrap">属性值</th>
                    <th width="20%" class="text-center nowrap">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr ng-repeat="prop in properties track by $index">
                    <td class="padding-0">
                        <label class="padding-0 margin-0">
                            <input class="layui-input border-0 padding-left-10 text-left" ng-model="prop.name"
                                ng-blur="rows[0].sku=setValue(rows[0].key,'sku',$event.target.value)">
                        </label>
                    </td>
                    <td class="padding-0">
                        <label class="padding-0 margin-0">
                            <input class="layui-input border-0 padding-left-10 text-left" ng-model="prop.value"
                                ng-blur="rows[0].market=setValue(rows[0].key,'market',$event.target.value,'(parseFloat(_)||0).toFixed(2)')">
                        </label>
                    </td>
                    <td class="padding-0">
                        <div class="layui-table-cell laytable-cell-1-0-7 text-center">
                            <a class="layui-btn layui-btn-normal layui-btn-xs" ng-click="upProp($index)"><i class="layui-icon layui-icon-up margin-0"></i></a>
                            <a class="layui-btn layui-btn-normal layui-btn-xs" ng-click="downProp($index)"><i class="layui-icon layui-icon-down margin-0"></i></a>
                            <a class="layui-btn layui-btn-danger layui-btn-xs" ng-click="deleteProp($index)"><i class="layui-icon layui-icon-delete margin-0"></i></a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            <button type='button' class='layui-btn layui-btn-primary layui-btn-sm' ng-click="addProp()"><i class="layui-icon layui-icon-addition"></i>添加属性</button>
        </div>

        <div class="layui-form-item">
            <span class="color-green font-w7">账号图片</span>
            <table class="layui-table">
                <thead>
                <tr>
                    <td class="text-left">
                        <input name="slider" type="hidden" value="{$vo.slider|default=''}">
                        <script>$('[name="slider"]').uploadMultipleImage();</script>
                    </td>
                </tr>
                </thead>
            </table>
        </div>

        <label class="layui-form-item relative block">
            <span class="color-green font-w7">账号描述</span>
            <span class="color-desc margin-left-5"></span>
            <textarea class="layui-textarea" name="remark" placeholder="请输入分类描述">{$vo.remark|default=''}</textarea>
        </label>
    </div>

    <div class="hr-line-dashed"></div>

    {notempty name='vo.id'}<input type='hidden' value='{$vo.id}' name='id'>{/notempty}
    {notempty name='vo.type_id'}<input type='hidden' value='{$vo.type_id}' name='type_id'>{/notempty}

    <div class="layui-form-item text-center">
        <button class="layui-btn" type='submit'>保存数据</button>
        <button class="layui-btn layui-btn-danger" type='button' data-confirm="确定要取消编辑吗？" data-history-back>取消编辑</button>
    </div>
</form>

{block name='script'}
<script>
    layui.form.render();
    require(['angular'], function () {

        var app = angular.module("AccountEditForm", []).run(callback);
        angular.bootstrap(document.getElementById(app.name), [app.name]);

        function callback($rootScope) {
            var _properties = [
                {name: '账号', value: 'kecoyo'},
                {name: '手机号', value: '15901097191'},
                {name: '邮箱', value: 'kecoyo@163.com'},
            ];
            $rootScope.properties = angular.fromJson(angular.toJson(_properties));

            /*! 增加属性 */
            $rootScope.addProp = function () {
                $rootScope.properties.push({name: '', value: ''});
            };
            /*! 删除属性 */
            $rootScope.deleteProp = function (index) {
                $rootScope.properties.splice(index, 1);
            };
            /*! 上移属性 */
            $rootScope.upProp = function (index) {
                var data = $rootScope.properties;
                if(index === 0) return;

                var tmp = data[index];
                data[index] = data[index - 1];
                data[index - 1] = tmp;
            };
            /*! 下移属性 */
            $rootScope.downProp = function (index) {
                var data = $rootScope.properties;
                if(index === data.length - 1) return;

                var tmp = data[index];
                data[index] = data[index + 1];
                data[index + 1] = tmp;
            };
        }

        $('[name="icon"]').on('change', function () {
            $('.butler-icon-preview').children(0).attr('src', this.value);
        });

        $('.butler-icon-button').on('click', function () {
            var location = '/butler/api.plugs/icon', field = this.dataset.field || 'icon';
            $.form.iframe(location + (location.indexOf('?') > -1 ? '&' : '?') + 'field=' + field, '图标选择');
        });


    });
</script>
{/block}
